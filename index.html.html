<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPEPE | The Golden King</title>
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --pepe-green: #377E22;
            --bg-dark: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Banner Section */
        .banner-container {
            width: 100%;
            max-width: 1500px;
            margin-top: 20px;
            padding: 0 10px;
        }

        .banner-img {
            width: 100%;
            border-radius: 15px;
            border: 3px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }

        /* Content Section */
        .content {
            text-align: center;
            padding: 60px 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 4rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--pepe-green);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* Twitter Card */
        .x-card {
            background: linear-gradient(145deg, #111, #000);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .x-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .x-link {
            font-size: 2rem;
            color: white;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            display: block;
            margin-bottom: 25px;
        }

        .btn-x {
            background: var(--gold);
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-x:hover {
            background: white;
            transform: scale(1.05);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 0.8rem;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="gpepe.jpg" alt="GPEPE Banner" class="banner-img">
    </div>

    <div class="content">
        <h1>$GPEPE</h1>
        <p class="subtitle">The Royal Standard of Memes</p>
        
        <div class="x-card">
            <p style="margin-bottom: 10px; color: #888; text-transform: uppercase;">Official X Handle</p>
            <a href="https://x.com/gpepe436" class="x-link">@gpepe436</a>
            <a href="https://x.com/gpepe436" class="btn-x" target="_blank">Follow the Court</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 GPEPE Kingdom. No intrinsic value. For the memes.</p>
    </footer>

</body>
</html>
